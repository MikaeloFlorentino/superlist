<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Superlist</title>
<link rel="stylesheet" href="/styles.css"></head><body>
<div class="container" id="app">
<div class="page active" id="page-auth">
  <div class="header"><h1>🛒 Superlist</h1></div>
  <div id="auth-section" style="max-width:380px;margin:40px auto">
    <div class="card"><h2 class="card-title">Iniciar sesión</h2>
      <div class="form-group"><label>Teléfono</label><input type="tel" id="auth-tel" placeholder="+521234567890"></div>
      <button class="btn btn-primary btn-block" id="auth-solicitar-btn">Enviar código</button>
      <div id="auth-code-section" class="hidden mt-16">
        <div class="form-group"><label>Código de 6 dígitos</label><input type="text" id="auth-code" placeholder="123456" maxlength="6"></div>
        <button class="btn btn-primary btn-block" id="auth-verificar-btn">Verificar código</button>
      </div>
      <div id="auth-msg" class="text-muted text-sm mt-8"></div>
    </div>
  </div>
</div>
<div class="page" id="page-main">
<div class="header">
  <h1>🛒</h1><span style="font-weight:700;color:var(--accent);font-size:20px">Superlist</span>
  <span class="user-info" id="user-info"></span>
  <button class="btn btn-sm btn-ghost" id="logout-btn" title="Cerrar sesión">✕</button>
</div>
<div class="nav-bar" id="nav-tabs">
  <button data-tab="familias" class="active">Familias</button>
  <button data-tab="catalogo" class="hidden" id="tab-catalogo">Catálogo</button>
  <button data-tab="listas" class="hidden" id="tab-listas">Listas</button>
  <button data-tab="compra" class="hidden" id="tab-compra">Compra</button>
  <button data-tab="pendientes" class="hidden" id="tab-pendientes">Pendientes</button>
  <button data-tab="historial" class="hidden" id="tab-historial">Historial</button>
</div>
<div class="page active" id="tab-familias-content">
  <div class="flex gap-8 mb-12 flex-wrap">
    <button class="btn btn-primary btn-sm" id="crear-familia-btn">+ Nueva familia</button>
    <button class="btn btn-sm" id="unirse-familia-btn">🔗 Unirse</button>
    <button class="btn btn-sm" id="perfil-btn">👤 Perfil</button>
  </div>
  <div id="familias-list"></div>
  <div id="invitaciones-section" class="hidden mt-16"><div class="section-title">Invitaciones pendientes</div><div id="invitaciones-list"></div></div>
</div>
<div class="page" id="tab-catalogo-content">
  <div class="flex gap-8 mb-12 flex-wrap">
    <select id="cat-familia-select" style="flex:1;min-width:120px"></select>
    <button class="btn btn-primary btn-sm" id="cat-add-btn">+ Artículo</button>
    <button class="btn btn-sm" id="cat-import-btn">📥 Importar</button>
  </div>
  <div class="form-group"><input type="text" id="cat-search" placeholder="Buscar artículos..."></div>
  <div id="cat-list"></div>
</div>
<div class="page" id="tab-listas-content">
  <div class="flex gap-8 mb-12 flex-wrap">
    <select id="list-familia-select" style="flex:1;min-width:120px"></select>
    <button class="btn btn-primary btn-sm" id="list-add-btn">+ Lista</button>
  </div>
  <select id="list-estado-filtro" style="margin-bottom:12px">
    <option value="">Todas</option><option value="PENDIENTE">Pendientes</option><option value="EN_CURSO">En curso</option><option value="COMPLETADA">Completadas</option>
  </select>
  <div id="list-list"></div>
</div>
<div class="page" id="tab-compra-content">
  <div class="flex gap-8 mb-12">
    <select id="compra-lista-select" style="flex:1;min-width:120px"></select>
    <button class="btn btn-sm" id="compra-refresh-btn">🔄</button>
  </div>
  <div id="compra-header"></div>
  <div class="progress-bar"><div class="fill" id="compra-progress-fill" style="width:0%"></div></div>
  <div id="compra-areas"></div>
  <div id="compra-resumen" class="text-muted text-sm mt-8"></div>
</div>
<div class="page" id="tab-pendientes-content">
  <div class="flex gap-8 mb-12">
    <select id="pend-familia-select" style="flex:1;min-width:120px"></select>
    <select id="pend-estado-filtro"><option value="PENDIENTE">Pendientes</option><option value="RESUELTO">Resueltos</option></select>
  </div>
  <div id="pendientes-list"></div>
</div>
<div class="page" id="tab-historial-content">
  <div class="flex gap-8 mb-12"><select id="hist-familia-select" style="flex:1;min-width:120px"></select></div>
  <div id="historial-list"></div>
</div>
</div>
</div>
<div id="modal-container"></div>
<div id="toast" class="toast hidden"></div>
<script src="/app.js"></script></body></html>
