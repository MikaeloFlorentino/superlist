<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superlist</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --bg: #f5f5f0;
    --card: #ffffff;
    --accent: #2d6a4f;
    --accent-light: #40916c;
    --accent-bg: #d8f3dc;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --danger: #dc2626;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 640px;
    padding: 24px 16px 80px;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -.5px;
  }
  header .count {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ── Add form ── */
  .add-form {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .add-form input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 16px;
    outline: none;
    transition: border .15s;
  }
  .add-form input:focus {
    border-color: var(--accent);
  }
  .add-form select {
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    background: white;
    outline: none;
    cursor: pointer;
  }
  .add-form button {
    padding: 12px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
    white-space: nowrap;
  }
  .add-form button:hover { background: var(--accent-light); }
  .add-form button:active { transform: scale(.96); }

  /* ── Filters ── */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .filters button {
    padding: 6px 14px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: white;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
  }
  .filters button:hover { border-color: var(--accent); color: var(--accent); }
  .filters button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── List ── */
  .list { list-style: none; }
  .list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 8px;
    transition: opacity .2s, transform .2s;
    animation: slideIn .2s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .list li.checked {
    opacity: .55;
  }
  .list li.checked .item-name {
    text-decoration: line-through;
    color: var(--text-muted);
  }
  .list li input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 16px;
    font-weight: 500;
    display: block;
  }
  .item-category {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .list li .delete-btn {
    background: none;
    border: none;
    font-size: 18px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: all .15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .list li .delete-btn:hover {
    color: var(--danger);
    background: #fee2e2;
  }
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--text-muted);
  }
  .empty h3 { font-size: 20px; margin-bottom: 8px; }
  .empty p { font-size: 14px; }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    justify-content: center;
    gap: 12px;
    backdrop-filter: blur(8px);
  }
  .bottom-bar button {
    padding: 10px 20px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
  }
  .bottom-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .bottom-bar .btn-danger:hover { border-color: var(--danger); color: var(--danger); }

  @media (max-width: 480px) {
    .container { padding: 16px 12px 80px; }
    .add-form { flex-wrap: wrap; }
    .add-form input { min-width: 0; }
    .add-form select { flex: 1; }
    .add-form button { flex: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🛒 Superlist</h1>
    <span class="count" id="count">0 items</span>
  </header>

  <form class="add-form" id="addForm">
    <input type="text" id="itemInput" placeholder="Ej. leche, pan, aguacate..." autocomplete="off" required>
    <select id="categorySelect">
      <option value="Frutas & Verd">Frutas & Verd</option>
      <option value="Lácteos">Lácteos</option>
      <option value="Carnes">Carnes</option>
      <option value="Panadería">Panadería</option>
      <option value="Despensa">Despensa</option>
      <option value="Congelados">Congelados</option>
      <option value="Bebidas">Bebidas</option>
      <option value="Limpieza">Limpieza</option>
      <option value="Otro">Otro</option>
    </select>
    <button type="submit">Añadir</button>
  </form>

  <div class="filters" id="filters">
    <button data-filter="all" class="active">Todas</button>
    <button data-filter="active">Pendientes</button>
    <button data-filter="checked">Completadas</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="bottom-bar">
    <button id="clearCheckedBtn" class="btn-danger">🗑 Limpiar completadas</button>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'superlist_items';

  // ── State ──
  let items = [];
  let filter = 'all';

  // ── DOM refs ──
  const $ = id => document.getElementById(id);
  const listEl       = $('list');
  const countEl      = $('count');
  const addForm      = $('addForm');
  const itemInput    = $('itemInput');
  const categorySel  = $('categorySelect');
  const filterBtns   = document.querySelectorAll('#filters button');
  const clearChecked = $('clearCheckedBtn');

  // ── Persistence ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      items = raw ? JSON.parse(raw) : [];
    } catch { items = []; }
  }

  // ── Render ──
  function render() {
    const filtered = items.filter(item => {
      if (filter === 'active')  return !item.done;
      if (filter === 'checked') return item.done;
      return true;
    });

    if (filtered.length === 0) {
      listEl.innerHTML = `<li class="empty" style="list-style:none;animation:none">
        <h3>${filter === 'all' ? '✨ Lista vacía' : filter === 'active' ? '🎉 Todo completo' : '😴 Sin completados'}</h3>
        <p>${filter === 'all' ? 'Añade algo al super' : ''}</p>
      </li>`;
    } else {
      listEl.innerHTML = filtered.map(item => `
        <li class="${item.done ? 'checked' : ''}" data-id="${item.id}">
          <input type="checkbox" ${item.done ? 'checked' : ''} data-toggle>
          <div class="item-info">
            <span class="item-name">${esc(item.name)}</span>
            <span class="item-category">${esc(item.category)}</span>
          </div>
          <button class="delete-btn" data-delete title="Eliminar">✕</button>
        </li>
      `).join('');
    }

    const total     = items.length;
    const completed = items.filter(i => i.done).length;
    countEl.textContent = `${total} item${total !== 1 ? 's' : ''}`;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Actions ──
  function addItem(name, category) {
    items.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      name: name.trim(),
      category,
      done: false,
      createdAt: Date.now()
    });
    save();
    render();
    itemInput.focus();
  }

  function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.done = !item.done; save(); render(); }
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  function clearChecked() {
    items = items.filter(i => !i.done);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    filterBtns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f);
    });
    render();
  }

  // ── Events ──
  addForm.addEventListener('submit', e => {
    e.preventDefault();
    const name = itemInput.value.trim();
    if (!name) return;
    addItem(name, categorySel.value);
    itemInput.value = '';
  });

  // Delegate events on the list
  listEl.addEventListener('click', e => {
    const li = e.target.closest('li');
    if (!li) return;
    const id = li.dataset.id;

    if (e.target.matches('[data-toggle]') || e.target.closest('[data-toggle]')) {
      toggleItem(id);
    } else if (e.target.matches('[data-delete]') || e.target.closest('[data-delete]')) {
      deleteItem(id);
    }
  });

  // Also listen for checkbox changes (for keyboard/accessibility)
  listEl.addEventListener('change', e => {
    if (e.target.matches('[data-toggle]')) {
      const li = e.target.closest('li');
      if (li) toggleItem(li.dataset.id);
    }
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => setFilter(btn.dataset.filter));
  });

  clearChecked.addEventListener('click', () => {
    if (items.some(i => i.done)) clearChecked();
  });

  // ── Init ──
  load();
  render();
})();
</script>
</body>
</html>
