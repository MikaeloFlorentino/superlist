spring:
  application:
    name: superlist-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/superlist
    username: mikaelo
    password: superlist2025
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Monterrey

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: superlist-jwt-secret-key-mvp-2025-change-in-production
    expiration-ms: 604800000 # 7 days
  sms:
    code-length: 6
    code-expiration-minutes: 10
    rate-limit-max: 3
    rate-limit-window-seconds: 60
  invitation:
    code-length: 8
